<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Pasta</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  #unlockBtn {
    margin: 20px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
  }

  .container {
    width: 100%;
    max-width: 430px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }

  .item {
    position: relative;
    width: 100%;
    height: 100px;
    cursor: pointer;
  }

  .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: filter 0.3s;
    user-select: none;
    -webkit-user-drag: none;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(255,255,255,0);
    pointer-events: none;
  }

  .active img {
    filter: brightness(150%);
  }

  .timer {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    font-weight: bold;
    color: black;
    display: none;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Bottone sblocco audio -->
<button id="unlockBtn">Clicca qui per sbloccare audio</button>

<div class="container" id="pastaContainer" style="display:none;">
  <div class="item" data-name="Rigatoni"><img src="rigatoni.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" data-name="Raviolini"><img src="raviolini.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" data-name="Ravioli"><img src="ravioli.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" data-name="Tagliolini"><img src="tagliolini.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" data-name="Gnocchi"><img src="gnocchi.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" data-name="Orecchiette"><img src="orecchiette.png"><div class="overlay"></div><div class="timer">0:00</div></div>
</div>

<audio id="audioPlayer"></audio>

<script>
const pastaTimers = {
  'Rigatoni': 0.1,
  'Raviolini': 0.1,
  'Ravioli': 5,
  'Tagliolini': 0.1,
  'Gnocchi': 5,
  'Orecchiette': 1
};

const pastaFrasiFinali = {
  'Rigatoni': "Sono pronti i Rigatoni!",
  'Raviolini': "Sono pronti i Raviolini!",
  'Ravioli': "Sono pronti i Ravioli!",
  'Tagliolini': "Sono pronti i Tagliolini!",
  'Gnocchi': "Sono pronti gli Gnocchi!",
  'Orecchiette': "Sono pronte le Orecchiette!"
};

const pastaAudio = {
  'Rigatoni': 'rigatoni.mp3',
  'Raviolini': 'raviolini.mp3',
  'Ravioli': 'ravioli.mp3',
  'Tagliolini': 'tagliolini.mp3',
  'Gnocchi': 'gnocchi.mp3',
  'Orecchiette': 'orecchiette.mp3'
};

const resetDelay = 5;
const audioPlayer = document.getElementById('audioPlayer');
let currentInterval = null;
let currentElement = null;

const unlockBtn = document.getElementById('unlockBtn');
const pastaContainer = document.getElementById('pastaContainer');

unlockBtn.addEventListener('click', ()=>{
  audioPlayer.src = '';
  audioPlayer.play().catch(()=>{});
  unlockBtn.style.display = 'none';
  pastaContainer.style.display = 'grid'; // mostra i piatti solo dopo sblocco
});

// Aggiunge click listener a tutti i piatti
document.querySelectorAll('.item').forEach(item=>{
  item.addEventListener('click', ()=>{
    const nome = item.getAttribute('data-name');

    // Ferma timer precedente
    if (currentInterval) {
      clearInterval(currentInterval);
      if (currentElement) {
        const timerDisplayOld = currentElement.querySelector(".timer");
        timerDisplayOld.textContent = "0:00";
        timerDisplayOld.style.display = "none";
        currentElement.classList.remove("active");
      }
    }

    // Ferma audio precedente
    if (!audioPlayer.paused) {
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
    }

    item.classList.add("active");
    const timerDisplay = item.querySelector(".timer");
    timerDisplay.style.display = "block";

    let seconds = pastaTimers[nome]*60;
    currentElement = item;

    currentInterval = setInterval(()=>{
      const m = Math.floor(seconds/60);
      const s = seconds % 60;
      timerDisplay.textContent = m + ":" + (s<10?"0"+s:s);
      seconds--;

      if(seconds < 0){
        clearInterval(currentInterval);
        currentInterval = null;
        timerDisplay.textContent = pastaFrasiFinali[nome];
        item.classList.remove("active");

        audioPlayer.src = pastaAudio[nome];
        audioPlayer.play().catch(()=>{});

        setTimeout(()=>{
          timerDisplay.textContent = "0:00";
          timerDisplay.style.display = "none";
        }, resetDelay*1000);
      }
    },1000);
  });
});
</script>
</body>
</html>
