<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Pasta</title>

<style>
  /* Stile generale body */
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  /* Contenitore a griglia per le immagini dei piatti */
  .container {
    width: 100%;
    max-width: 430px;
    height: 100vh;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }

  /* Ogni piatto */
  .item {
    position: relative;
    width: 100%;
    height: 100%;
  }

  .item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: filter 0.3s;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* Overlay trasparente sopra le immagini */
  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,255,255,0);
    pointer-events: none;
  }

  /* Effetto quando il piatto è attivo */
  .active img {
    filter: brightness(150%);
  }

  /* Timer al centro dell'immagine */
  .timer {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 48px;
    font-weight: bold;
    color: black;
    display: none;
    text-align: center;
  }
</style>
</head>
<body>

<div class="container">
  <div class="item" onclick="startTimer(this,'Rigatoni')"><img src="rigatoni.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" onclick="startTimer(this,'Raviolini')"><img src="raviolini.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" onclick="startTimer(this,'Ravioli')"><img src="ravioli.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" onclick="startTimer(this,'Tagliolini')"><img src="tagliolini.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" onclick="startTimer(this,'Gnocchi')"><img src="gnocchi.png"><div class="overlay"></div><div class="timer">0:00</div></div>
  <div class="item" onclick="startTimer(this,'Orecchiette')"><img src="orecchiette.png"><div class="overlay"></div><div class="timer">0:00</div></div>
</div>

<!-- Player audio invisibile -->
<audio id="audioPlayer"></audio>

<script>
  // Tempi dei piatti in minuti
  const pastaTimers = {
    'Rigatoni': 0.1,
    'Raviolini': 0.1,
    'Ravioli': 5,
    'Tagliolini': 0.1,
    'Gnocchi': 5,
    'Orecchiette': 1
  };

  // Frasi finali da mostrare
  const pastaFrasiFinali = {
    'Rigatoni': "Sono pronti i Rigatoni!",
    'Raviolini': "Sono pronti i Raviolini!",
    'Ravioli': "Sono pronti i Ravioli!",
    'Tagliolini': "Sono pronti i Tagliolini!",
    'Gnocchi': "Sono pronti gli Gnocchi!",
    'Orecchiette': "Sono pronte le Orecchiette!"
  };

  // Audio associati ai piatti
  const pastaAudio = {
    'Rigatoni': 'rigatoni.m4a',
    'Raviolini': 'raviolini.m4a',
    'Ravioli': 'ravioli.m4a',
    'Tagliolini': 'tagliolini.m4a',
    'Gnocchi': 'gnocchi.m4a',
    'Orecchiette': 'orecchiette.m4a'
  };

  const resetDelay = 5; // tempo dopo il quale il timer si resetta
  const audioPlayer = document.getElementById('audioPlayer');

  let currentInterval = null; // intervallo timer attivo
  let currentElement = null;  // elemento attivo

  // Trucco iOS: sblocca l'audio al primo click senza riprodurlo
  function unlockAudio() {
    audioPlayer.src = '';
    audioPlayer.play().catch(()=>{}); // non suona niente, serve solo per sbloccare
    document.removeEventListener('click', unlockAudio);
  }
  document.addEventListener('click', unlockAudio);

  // Funzione principale per avviare il timer
  function startTimer(element, nome) {
    // Ferma eventuale timer precedente
    if (currentInterval) {
      clearInterval(currentInterval);
      if (currentElement) {
        const timerDisplayOld = currentElement.querySelector(".timer");
        timerDisplayOld.textContent = "0:00";
        timerDisplayOld.style.display = "none";
        currentElement.classList.remove("active");
      }
    }

    // Ferma audio precedente se sta suonando
    if (!audioPlayer.paused) {
      audioPlayer.pause();
      audioPlayer.currentTime = 0;
    }

    element.classList.add("active");
    const timerDisplay = element.querySelector(".timer");
    timerDisplay.style.display = "block";

    let seconds = pastaTimers[nome]*60;
    currentElement = element;

    currentInterval = setInterval(() => {
      const m = Math.floor(seconds/60);
      const s = seconds % 60;
      timerDisplay.textContent = m + ":" + (s<10?"0"+s:s);
      seconds--;

      if (seconds < 0) {
        clearInterval(currentInterval);
        currentInterval = null;

        // Mostra frase finale
        timerDisplay.textContent = pastaFrasiFinali[nome];
        element.classList.remove("active");

        // Riproduce l'audio solo alla fine del timer
        if (audioPlayer.paused) {
          audioPlayer.src = pastaAudio[nome];
          audioPlayer.play().catch(()=>{}); 
        }

        // Reset timer dopo pochi secondi
        setTimeout(()=>{
          timerDisplay.textContent = "0:00";
          timerDisplay.style.display = "none";
        }, resetDelay*1000);
      }
    },1000);
  }
</script>
</body>
</html>
